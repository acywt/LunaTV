name: Build and Upload Static Site

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 'latest'

      - name: Install dependencies and build
        run: pnpm install --frozen-lockfile && pnpm run build && pnpm run postbuild

      - name: Prepare build output for upload
        run: |
          mkdir -p cloudflare-build
          # 关键：把正确的构建产物复制到上传文件夹
          cp -r .vercel/output/static/* cloudflare-build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-static
          path: cloudflare-build/
